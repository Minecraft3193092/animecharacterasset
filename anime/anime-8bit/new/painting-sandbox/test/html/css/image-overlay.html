<style>
/* 1. 外層容器：定義一個獨立的空間坐標軸 */
.overlay-container {
  position: relative; /* 核心：讓內部的 absolute 元素以此為對齊基準 */
  width: 500px;       /* 可以依需求調整寬度 */
  max-width: 100%;
  overflow: hidden;   /* 避免內部元素超出容器 */
}

/* 確保底圖填滿容器 */
.base-image {
  width: 100%;
  display: block;     /* 消除圖片下方預設的空白間隙 */
}

/* 2. 疊加層：像貼紙一樣絕對定位 */
.overlay-content {
  position: absolute; /* 核心：脫離正常排版流，浮動在上方 */
  
  /* 決定你想貼在畫面的哪個位置（選填） */
  bottom: 20px;       /* 距離底部 20 像素 */
  left: 20px;         /* 距離左側 20 像素 */
  
  /* 裝飾樣式：讓疊加的內容更清晰 */
  background: rgba(0, 0, 0, 0.6); /* 半透明黑底，防止文字跟底圖顏色融在一起 */
  color: white;
  padding: 15px;
  border-radius: 8px;
  z-index: 2;         /* 確保這層絕對在圖片上方 */
}
</style>

<div class="overlay-container">
  <img src="your-image.jpg" alt="底圖" class="base-image">
  
  <div class="overlay-content">
    <h3>這裡是可以疊加的標題</h3>
    <button>點我點我</button>
  </div>
</div>
