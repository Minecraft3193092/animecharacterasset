<!DOCTYPE html>
<html lang="news" id="page">

<head>
<title>{{ $pageData['page_content'] }} | wiki</title>

<style>
.title-s {
  font-size: 20px;
}

.wrapper {
    display: flex;
    max-width: 1200px;
    margin: 0 auto;
}

.content {
    flex: 3;
    height: 100%;
    background-color: #f4f4f4;
    padding: 20px;
}

.content-2 {
    flex: 3;
    height: 100%;
    background-color: #ffffff;
    padding: 10px;
}

.sidebar {
    flex: 1;
    background-color: #e5e5e5;
    padding: 10px;
}

.time-text-container {
  flex: 1;
  text-align: center; 
  background-color: #f2f2f2;
  padding: 10px;
}

.nav {
  text-align: center; 
  padding: 10px;
}

.weather-left {
    flex: 3;
}

.text-center {
  text-align: center; 
}

.weather-right {
    flex: 3;
    font-size: 30px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.overlay-container {
  position: relative; /* 核心：讓內部的 absolute 元素以此為對齊基準 */
  max-width: 100%;
  overflow: hidden;   /* 避免內部元素超出容器 */
}

/* 確保底圖填滿容器 */
.base-image {
  width: 100%;
  display: block;     /* 消除圖片下方預設的空白間隙 */
}

/* 2. 疊加層：像貼紙一樣絕對定位 */
.overlay-content {
  position: absolute; /* 核心：脫離正常排版流，浮動在上方 */
  
  /* 決定你想貼在畫面的哪個位置（選填） */
  bottom: 20px;       /* 距離底部 20 像素 */
  left: 20px;         /* 距離左側 20 像素 */
  
  /* 裝飾樣式：讓疊加的內容更清晰 */
  background: rgba(0, 0, 0, 0.6); /* 半透明黑底，防止文字跟底圖顏色融在一起 */
  color: white;
  padding: 15px;
  border-radius: 8px;
  z-index: 2;         /* 確保這層絕對在圖片上方 */
}
</style>

<script>
function refreshTime() {
const date = new Date();
document.getElementById("time-h").innerHTML = date.getHours();
document.getElementById("time-m").innerHTML = date.getMinutes();
}

setInterval(refreshTime, 1000);
</script>

</head>
